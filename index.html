<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美美瑜伽工作室 · 课时管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--sage:#7a9e7e;--sage-light:#a8c5ab;--sage-dark:#4d7352;--sage-mist:rgba(122,158,126,0.08);--clay:#c9956c;--cream:#f8f4ee;--warm-white:#fdfaf5;--charcoal:#2c2c2c;--muted:#8a8a7a;--border:#e2ddd6;--card-bg:#fff;--danger:#c0715a;--warning:#d4a843;--success:#5a8f5e;--serif:'Noto Serif SC',serif;--sans:'Noto Sans SC',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--cream);color:var(--charcoal);min-height:100vh}
body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(122,158,126,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-150px;left:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(201,149,108,.1) 0%,transparent 70%);pointer-events:none;z-index:0}
header{background:rgba(253,250,245,.92);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.hi{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:.85rem 0;gap:1rem;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:.75rem}
.logo-icon{width:38px;height:38px;background:var(--sage);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.logo h1{font-family:var(--serif);font-size:1.25rem;font-weight:600;line-height:1}
.logo span{font-size:.67rem;color:var(--muted);letter-spacing:.08em;font-weight:300}
.hs{display:flex;gap:2rem}
.st{text-align:center}
.st-n{font-family:var(--serif);font-size:1.5rem;font-weight:600;color:var(--sage-dark);line-height:1}
.st-l{font-size:.65rem;color:var(--muted);letter-spacing:.06em}
.ha{display:flex;gap:.45rem}
.bh{padding:.5rem .9rem;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--muted);font-size:.8rem;font-family:var(--sans);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.35rem;white-space:nowrap}
.bh:hover{border-color:var(--sage);color:var(--sage-dark)}
.bh.pri{background:var(--sage-dark);color:#fff;border-color:var(--sage-dark);font-weight:500}
.bh.pri:hover{background:var(--sage)}
main{max-width:1100px;margin:0 auto;padding:1.8rem 2rem 4rem;position:relative;z-index:1}
.tb{display:flex;gap:.7rem;margin-bottom:1.7rem;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:200px;position:relative}
.sw input{width:100%;padding:.6rem 1rem .6rem 2.4rem;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);font-family:var(--sans);font-size:.87rem;outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--sage)}
.sw::before{content:'🔍';position:absolute;left:.7rem;top:50%;transform:translateY(-50%);font-size:.76rem}
.fb{padding:.58rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);font-family:var(--sans);font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .2s}
.fb:hover{border-color:var(--sage-light)}.fb.a{background:var(--sage);border-color:var(--sage);color:#fff}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(305px,1fr));gap:1.15rem}
.sc{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.3rem;position:relative;transition:box-shadow .25s,transform .25s;cursor:pointer;animation:fu .4s ease both}
.sc:hover{box-shadow:0 8px 30px rgba(0,0,0,.07);transform:translateY(-2px)}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.ct{display:flex;align-items:center;gap:.8rem;margin-bottom:.85rem}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1rem;font-weight:600;color:#fff;flex-shrink:0}
.ci{flex:1;min-width:0}
.cn{font-family:var(--serif);font-size:1.05rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:.72rem;color:var(--muted);margin-top:1px}
.bdg{position:absolute;top:1rem;right:1rem;font-size:.62rem;padding:.15rem .55rem;border-radius:99px;font-weight:500}
.bdg.al{background:#fde8e4;color:var(--danger)}.bdg.wn{background:#fdf3e0;color:var(--warning)}
.cs{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.cs-l{font-size:.7rem;color:var(--muted);letter-spacing:.06em}
.cs-v{font-family:var(--serif);font-size:1.85rem;font-weight:600;line-height:1}
.cs-t{font-size:.76rem;color:var(--muted)}
.pg{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:.85rem}
.pf{height:100%;border-radius:99px;transition:width .5s ease}
.pf.low{background:var(--danger)}.pf.medium{background:var(--warning)}.pf.good{background:var(--sage)}
.nb{background:var(--sage-mist);border-radius:8px;padding:.45rem .65rem;font-size:.73rem;color:var(--sage-dark);margin-bottom:.75rem;line-height:1.45}
.ca{display:flex;gap:.4rem}
.bs{flex:1;padding:.4rem 0;border-radius:7px;border:1px solid var(--border);font-family:var(--sans);font-size:.77rem;font-weight:500;cursor:pointer;transition:all .2s;background:var(--card-bg);color:var(--charcoal);text-align:center}
.bs.use{border-color:var(--sage);color:var(--sage-dark)}.bs.use:hover{background:var(--sage);color:#fff}.bs.use:disabled{opacity:.35;cursor:not-allowed;background:var(--card-bg)}
.bs.ed:hover{background:var(--border)}.bs.dl:hover{background:#fde8e4;color:var(--danger);border-color:var(--danger)}
.es{text-align:center;padding:3.5rem 2rem;color:var(--muted);grid-column:1/-1}
.es .ic{font-size:3rem;margin-bottom:.8rem;opacity:.6}
.es h3{font-family:var(--serif);font-size:1.25rem;margin-bottom:.4rem;color:var(--charcoal)}
.fh{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:3rem 2rem;text-align:center;max-width:440px;margin:3rem auto}
.fh h3{font-family:var(--serif);font-size:1.25rem;margin-bottom:.7rem}
.fh p{font-size:.86rem;color:var(--muted);line-height:1.6;margin-bottom:1.3rem}
.bu{display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.5rem;background:var(--sage-dark);color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:500;cursor:pointer;font-family:var(--sans)}
.bu:hover{background:var(--sage)}
.mo{display:none;position:fixed;inset:0;background:rgba(44,44,44,.35);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:1rem}
.mo.open{display:flex}
.md{background:var(--warm-white);border-radius:16px;padding:1.7rem;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.14);animation:mi .25s ease}
.md.w{max-width:600px}
@keyframes mi{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mt{font-family:var(--serif);font-size:1.25rem;font-weight:600;margin-bottom:1.3rem}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.fg>.fl{grid-column:1/-1}
.gr{display:flex;flex-direction:column;gap:.25rem}
.lb{font-size:.72rem;color:var(--muted);letter-spacing:.06em}
.ip{padding:.6rem .8rem;border:1px solid var(--border);border-radius:8px;background:#fff;font-family:var(--sans);font-size:.87rem;outline:none;transition:border-color .2s}
.ip:focus{border-color:var(--sage)}
textarea.ip{min-height:50px;resize:vertical}
.ma{display:flex;gap:.65rem;margin-top:1.3rem}
.bc{flex:1;padding:.6rem;border:1px solid var(--border);border-radius:8px;background:none;font-family:var(--sans);font-size:.87rem;color:var(--muted);cursor:pointer}
.bc:hover{background:var(--cream)}
.bv{flex:2;padding:.6rem;background:var(--sage-dark);color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-size:.87rem;font-weight:500;cursor:pointer}
.bv:hover{background:var(--sage)}.bv.dg{background:var(--danger)}.bv.dg:hover{background:#d4836c}
.sst{font-family:var(--serif);font-size:.92rem;font-weight:600;margin-bottom:.7rem;padding-bottom:.45rem;border-bottom:1px solid var(--border)}
.pt{width:100%;border-collapse:collapse}
.pt th{text-align:left;font-size:.66rem;font-weight:500;color:var(--muted);padding:.45rem .5rem;border-bottom:1px solid var(--border)}
.pt td{padding:.6rem .5rem;border-bottom:1px solid rgba(226,221,214,.5);font-size:.86rem}
.pt tr:last-child td{border-bottom:none}
.pn{font-weight:600}.pp{color:var(--clay);font-weight:500}
.pa{display:flex;gap:.3rem;justify-content:flex-end}
.pa button{width:27px;height:27px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center}
.pa button:hover{background:var(--cream)}
.bap{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem .9rem;margin-top:.6rem;border:1px dashed var(--border);border-radius:8px;background:none;color:var(--muted);font-size:.8rem;cursor:pointer;font-family:var(--sans)}
.bap:hover{border-color:var(--sage);color:var(--sage-dark)}
.pe{display:flex;gap:.5rem;align-items:center;margin-top:.6rem;flex-wrap:wrap}
.pe input{padding:.45rem .6rem;border:1px solid var(--border);border-radius:8px;font-size:.83rem;font-family:var(--sans);outline:none;background:#fff}
.pe input:focus{border-color:var(--sage)}
.pe .i1{flex:2;min-width:90px}.pe .i2{flex:1;min-width:55px}
.peb{display:flex;gap:.3rem}
.peb button{padding:.45rem .8rem;border-radius:7px;font-size:.76rem;font-weight:500;cursor:pointer;font-family:var(--sans);border:none}
.pes{background:var(--sage-dark);color:#fff}.pec{background:var(--border);color:var(--charcoal)}
.dh{display:flex;align-items:center;gap:1rem;margin-bottom:1.3rem;padding-bottom:1.1rem;border-bottom:1px solid var(--border)}
.da{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.25rem;font-weight:600;font-family:var(--serif);flex-shrink:0}
.dn{font-family:var(--serif);font-size:1.3rem;font-weight:600}
.dm{font-size:.76rem;color:var(--muted);margin-top:2px}
.ds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.65rem;margin-bottom:1.3rem}
.di{background:var(--cream);border-radius:10px;padding:.8rem .6rem;text-align:center}
.dv{font-family:var(--serif);font-size:1.35rem;font-weight:600}
.dll{font-size:.64rem;color:var(--muted);margin-top:2px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:.9rem}
.tab{padding:.55rem 1.1rem;font-size:.83rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:var(--sans);background:none;border-top:none;border-left:none;border-right:none}
.tab.ac{color:var(--sage-dark);border-bottom-color:var(--sage-dark);font-weight:500}
.ht{width:100%;border-collapse:collapse;font-size:.8rem}
.ht th{text-align:left;padding:.45rem .4rem;font-size:.66rem;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border)}
.ht td{padding:.55rem .4rem;border-bottom:1px solid rgba(226,221,214,.4)}
.ht tr:last-child td{border-bottom:none}
.he{text-align:center;padding:1.8rem 1rem;color:var(--border);font-size:.86rem}
.sb{position:fixed;top:.6rem;right:.6rem;z-index:150;font-size:.7rem;padding:.25rem .6rem;border-radius:6px;font-family:var(--sans);pointer-events:none;transition:opacity .3s}
.sb.sy{background:#e8f0e4;color:var(--sage-dark);opacity:1}
.sb.sd{background:#e8f0e4;color:var(--sage-dark);opacity:1}
.sb.se{background:#fde8e4;color:var(--danger);opacity:1}
.sb.hd{opacity:0}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--charcoal);color:#fff;padding:.65rem 1.15rem;border-radius:10px;font-size:.83rem;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s ease;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:640px){header{padding:0 1rem}.hs{display:none}main{padding:1rem 1rem 3rem}.cg{grid-template-columns:1fr}.fg{grid-template-columns:1fr}.fg>.fl{grid-column:auto}.tb{gap:.45rem}.ha{gap:.25rem}.bh{padding:.42rem .6rem;font-size:.74rem}.ds{grid-template-columns:1fr}.pe{flex-direction:column}.pe input{width:100%}}
</style>
</head>
<body>
<header><div class="hi">
<div class="logo"><div class="logo-icon">🪷</div><div><h1>美美瑜伽工作室</h1><span>学员课时管理</span></div></div>
<div class="hs"><div class="st"><div class="st-n" id="hT">0</div><div class="st-l">学员总数</div></div><div class="st"><div class="st-n" id="hL">0</div><div class="st-l">课时不足</div></div><div class="st"><div class="st-n" id="hR">0</div><div class="st-l">剩余课时</div></div></div>
<div class="ha"><button class="bh" onclick="openPkg()">⚙️ 套餐</button><button class="bh" onclick="expXl()">💾 导出</button><button class="bh pri" onclick="openAdd()">＋ 添加学员</button></div>
</div></header>
<main id="mc"></main>

<div class="mo" id="mF"><div class="md"><h2 class="mt" id="fTi">添加新学员</h2><div class="fg">
<div class="gr"><label class="lb">学员姓名 *</label><input class="ip" id="fN"></div>
<div class="gr"><label class="lb">课程套餐</label><select class="ip" id="fPk"></select></div>
<div class="gr"><label class="lb">总课时</label><input class="ip" id="fTc" type="number"></div>
<div class="gr"><label class="lb">剩余课时</label><input class="ip" id="fRc" type="number"></div>
<div class="gr"><label class="lb">已上课时</label><input class="ip" id="fUc" type="number"></div>
<div class="gr"><label class="lb">入学日期</label><input class="ip" id="fDt" type="date"></div>
<div class="gr fl"><label class="lb">备注</label><textarea class="ip" id="fNo"></textarea></div>
</div><div class="ma"><button class="bc" onclick="cl('mF')">取消</button><button class="bv" id="fBt" onclick="subF()">保存</button></div></div></div>

<div class="mo" id="mP"><div class="md w"><h2 class="mt">⚙️ 套餐设置</h2><div style="margin-bottom:1.2rem"><div class="sst">课程套餐管理</div><table class="pt"><thead><tr><th>套餐名称</th><th>课时数</th><th>价格(福林)</th><th style="text-align:right">操作</th></tr></thead><tbody id="ptb"></tbody></table><div id="pea"></div><button class="bap" id="bapB" onclick="addPk()">＋ 添加新套餐</button></div><div class="ma"><button class="bv" onclick="cl('mP')">完成</button></div></div></div>

<div class="mo" id="mD"><div class="md w" id="dc"></div></div>
<div class="mo" id="mC"><div class="md"><p id="cMs" style="font-size:.93rem;line-height:1.6;margin-bottom:1.4rem"></p><div class="ma"><button class="bc" onclick="cl('mC')">取消</button><button class="bv dg" id="cBt">确认删除</button></div></div></div>
<div class="mo" id="mAC"><div class="md"><h2 class="mt">📝 添加上课记录</h2><div class="fg"><div class="gr"><label class="lb">上课日期</label><input class="ip" id="acD" type="date"></div><div class="gr"><label class="lb">上课时间</label><input class="ip" id="acT" type="time"></div><div class="gr fl"><label class="lb">备注</label><input class="ip" id="acN"></div></div><div class="ma"><button class="bc" onclick="cl('mAC')">取消</button><button class="bv" onclick="subAC()">确认</button></div></div></div>
<div class="mo" id="mAR"><div class="md"><h2 class="mt">💰 添加充值记录</h2><div class="fg"><div class="gr"><label class="lb">充值日期</label><input class="ip" id="arD" type="date"></div><div class="gr"><label class="lb">套餐名称</label><select class="ip" id="arPk"></select></div><div class="gr"><label class="lb">课时数</label><input class="ip" id="arCl" type="number"></div><div class="gr"><label class="lb">价格(福林)</label><input class="ip" id="arPr" type="number"></div><div class="gr"><label class="lb">支付方式</label><select class="ip" id="arPy"><option>现金</option><option>转账</option><option>其他</option></select></div><div class="gr"><label class="lb">备注</label><input class="ip" id="arNo"></div></div><div class="ma"><button class="bc" onclick="cl('mAR')">取消</button><button class="bv" onclick="subAR()">确认</button></div></div></div>

<div class="toast" id="toast"></div>
<div class="sb hd" id="sb"></div>
<input type="file" id="fi" accept=".xlsx,.xls" style="display:none" onchange="impF(event)">

<script>
// ★★★ 将你的 Google Apps Script URL 粘贴到下面 ★★★
const API='https://script.google.com/macros/s/AKfycbwNJAj65w0xXVMXo1Q-e122y7kMgD4AyTzjqqVBgOFHQ8rB_bY34JUNQpR3r-9uhCyaCw/exec';

const COL=['#7a9e7e','#c9956c','#8fa8c8','#b5879a','#9db87a','#c4a35a','#7aabb5'];
let ST=[],PK=[],CL=[],RE=[];
let flt='all',eId=null,pkM=null,dId=null,dTb='class',arId=null,ok=false;
const LS={s:'my-s',p:'my-p',c:'my-c',r:'my-r'};

function E(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function FD(d){try{return new Date(d).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});}catch{return d||'';}}
function TD(){return new Date().toISOString().split('T')[0];}
function cl(id){document.getElementById(id).classList.remove('open');}
function gi(n){const t=(n||'').trim();if(/[\u4e00-\u9fa5]/.test(t))return t.slice(-2);return t.slice(0,2);}
function gst(r,t){r=r||0;t=t||0;if(t<=0&&r<=0)return{lv:'good',clr:'var(--muted)',lb:''};if(r<=0)return{lv:'low',clr:'var(--danger)',lb:'课时已用完'};if(t>0&&r/t<=.2)return{lv:'medium',clr:'var(--warning)',lb:'即将用完'};return{lv:'good',clr:'var(--success)',lb:''};}
function nid(arr,pfx){const ns=arr.map(x=>{const m=String(x.id).match(/(\d+)$/);return m?+m[1]:0;});return pfx+String((ns.length?Math.max(...ns):0)+1).padStart(4,'0');}
let tT;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>e.classList.remove('show'),2800);}

// === SYNC ===
let sT=null;
function ssb(c,m){const b=document.getElementById('sb');b.textContent=m;b.className='sb '+c;if(c==='sd')setTimeout(()=>b.classList.add('hd'),2000);}
function sync(){if(!API)return;clearTimeout(sT);sT=setTimeout(()=>{ssb('sy','☁️ 同步中…');
const d={students:ST.map(s=>({'学员ID':s.id,'姓名':s.name,'最新课程套餐':s.pkg,'总课时':s.total,'已上课时':s.used,'剩余课时':s.remain,'入学日期':s.join,'最新上课日期':s.last,'备注':s.notes})),
packages:PK.map(p=>({'套餐ID':p.id,'套餐名称':p.name,'课时数':p.cls,'价格(福林)':p.price})),
classHistory:CL.map(c=>({'记录ID':c.id,'学员ID':c.sid,'学员姓名':c.sn,'上课日期':c.date,'上课时间':c.time,'备注':c.notes})),
rechargeHistory:RE.map(r=>({'记录ID':r.id,'学员ID':r.sid,'学员姓名':r.sn,'充值日期':r.date,'套餐名称':r.pkg,'课时数':r.cls,'价格(福林)':r.amt,'支付方式':r.pay,'备注':r.notes}))};
fetch(API+'?action=write&data='+encodeURIComponent(JSON.stringify(d)),{method:'GET',mode:'no-cors'}).then(()=>ssb('sd','✓ 已同步')).catch(()=>ssb('se','⚠ 同步失败'));},800);}
function loadCloud(){return new Promise((res,rej)=>{if(!API){rej();return;}ssb('sy','☁️ 加载中…');
fetch(API+'?action=read').then(r=>r.json()).then(d=>{if(d.error){ssb('se','⚠ 失败');rej();return;}
if(d.students&&d.students.length){parseCloud(d);ssb('sd','✓ 已同步');res(true);}else{ssb('sd','✓ 已连接');res(false);}}).catch(()=>{ssb('se','⚠ 连接失败');rej();});});}
function pdt(v){if(!v||v==='')return '';if(typeof v==='number'){return new Date((v-25569)*86400000).toISOString().split('T')[0];}const s=String(v);if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);try{const d=new Date(s);return isNaN(d)?'':d.toISOString().split('T')[0];}catch{return '';}}
function parseCloud(d){
ST=(d.students||[]).filter(r=>r['学员ID']).map(r=>({id:r['学员ID'],name:r['姓名']||'',pkg:r['最新课程套餐']||'',total:+r['总课时']||0,used:+r['已上课时']||0,remain:+r['剩余课时']||0,join:pdt(r['入学日期']),last:pdt(r['最新上课日期']),notes:r['备注']||''}));
PK=(d.packages||[]).filter(r=>r['套餐名称']).map(r=>({id:+r['套餐ID'],name:r['套餐名称']||'',cls:r['课时数'],price:r['价格(福林)']}));
CL=(d.classHistory||[]).filter(r=>r['记录ID']).map(r=>({id:r['记录ID'],sid:r['学员ID'],sn:r['学员姓名']||'',date:pdt(r['上课日期']),time:r['上课时间']||'',notes:r['备注']||''}));
RE=(d.rechargeHistory||[]).filter(r=>r['记录ID']).map(r=>({id:r['记录ID'],sid:r['学员ID'],sn:r['学员姓名']||'',date:pdt(r['充值日期']),pkg:r['套餐名称']||'',cls:+r['课时数']||0,amt:+r['价格(福林)']||0,pay:r['支付方式']||'',notes:r['备注']||''}));
svLS();ok=true;}

function svLS(){localStorage.setItem(LS.s,JSON.stringify(ST));localStorage.setItem(LS.p,JSON.stringify(PK));localStorage.setItem(LS.c,JSON.stringify(CL));localStorage.setItem(LS.r,JSON.stringify(RE));}
function sv(){svLS();sync();}
function ldLS(){try{ST=JSON.parse(localStorage.getItem(LS.s))||[];PK=JSON.parse(localStorage.getItem(LS.p))||[];CL=JSON.parse(localStorage.getItem(LS.c))||[];RE=JSON.parse(localStorage.getItem(LS.r))||[];return ST.length>0;}catch{return false;}}

// === XLSX IMPORT ===
function impF(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){parseXL(XLSX.read(new Uint8Array(e.target.result),{type:'array'}));render();toast('✓ 数据导入成功');};r.readAsArrayBuffer(f);}
function parseXL(wb){
function sh(n){const w=wb.Sheets[n];return w?XLSX.utils.sheet_to_json(w,{defval:''}):[]}
ST=sh('学员信息').filter(r=>r['学员ID']).map(r=>({id:r['学员ID'],name:r['姓名']||'',pkg:r['最新课程套餐']||'',total:+r['总课时']||0,used:+r['已上课时']||0,remain:+r['剩余课时']||0,join:pdt(r['入学日期']),last:pdt(r['最新上课日期']),notes:r['备注']||''}));
PK=sh('套餐设置').filter(r=>r['套餐名称']).map(r=>({id:+r['套餐ID'],name:r['套餐名称']||'',cls:r['课时数'],price:r['价格(福林)']}));
CL=sh('上课记录').filter(r=>r['记录ID']).map(r=>({id:r['记录ID'],sid:r['学员ID'],sn:r['学员姓名']||'',date:pdt(r['上课日期']),time:r['上课时间']||'',notes:r['备注']||''}));
RE=sh('充值记录').filter(r=>r['记录ID']).map(r=>({id:r['记录ID'],sid:r['学员ID'],sn:r['学员姓名']||'',date:pdt(r['充值日期']),pkg:r['套餐名称']||'',cls:+r['课时数']||0,amt:+r['价格(福林)']||0,pay:r['支付方式']||'',notes:r['备注']||''}));
// Compute missing fields
ST.forEach(s=>{const u=CL.filter(c=>c.sid===s.id).length;const t=RE.filter(r=>r.sid===s.id).reduce((a,r)=>a+r.cls,0);if(!s.used)s.used=u;if(!s.total)s.total=t;if(!s.remain)s.remain=s.total-s.used;if(!s.pkg){const rc=RE.filter(r=>r.sid===s.id);if(rc.length)s.pkg=rc[rc.length-1].pkg;}});
sv();ok=true;}

function expXl(){const wb=XLSX.utils.book_new();
const a=[['学员ID','姓名','最新课程套餐','总课时','已上课时','剩余课时','入学日期','最新上课日期','备注']];ST.forEach(s=>a.push([s.id,s.name,s.pkg,s.total,s.used,s.remain,s.join,s.last,s.notes]));XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(a),'学员信息');
const b=[['套餐ID','套餐名称','课时数','价格(福林)']];PK.forEach(p=>b.push([p.id,p.name,p.cls,p.price]));XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(b),'套餐设置');
const c=[['记录ID','学员ID','学员姓名','上课日期','上课时间','备注']];CL.forEach(x=>c.push([x.id,x.sid,x.sn,x.date,x.time,x.notes]));XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(c),'上课记录');
const d=[['记录ID','学员ID','学员姓名','充值日期','套餐名称','课时数','价格(福林)','支付方式','备注']];RE.forEach(x=>d.push([x.id,x.sid,x.sn,x.date,x.pkg,x.cls,x.amt,x.pay,x.notes]));XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),'充值记录');
XLSX.writeFile(wb,'美美瑜伽_'+TD()+'.xlsx');toast('💾 已导出');}

// === RENDER ===
function render(){const mc=document.getElementById('mc');if(!ok){mc.innerHTML=`<div class="fh"><div style="font-size:3rem;margin-bottom:1rem;opacity:.6">📊</div><h3>加载学员数据</h3><p>${API?'正在从云端加载…':'上传 <strong>初始瑜伽数据.xlsx</strong> 开始使用'}</p><button class="bu" onclick="document.getElementById('fi').click()">📁 选择 Excel 文件</button></div>`;return;}
mc.innerHTML=`<div class="tb"><div class="sw"><input id="si" placeholder="搜索学员姓名…" oninput="cards()"></div><button class="fb ${flt==='all'?'a':''}" onclick="sf('all',this)">全部</button><button class="fb ${flt==='active'?'a':''}" onclick="sf('active',this)">有效</button><button class="fb ${flt==='low'?'a':''}" onclick="sf('low',this)">课时不足</button><button class="fb ${flt==='empty'?'a':''}" onclick="sf('empty',this)">已用完</button></div><div class="cg" id="cg"></div>`;stats();cards();}

function stats(){const t=ST.length,l=ST.filter(s=>s.remain<=0&&s.total>0).length+ST.filter(s=>s.remain>0&&s.total>0&&s.remain/s.total<=.2).length,r=ST.reduce((a,s)=>a+Math.max(0,s.remain||0),0);const $=id=>document.getElementById(id);if($('hT')){$('hT').textContent=t;$('hL').textContent=l;$('hR').textContent=r;}}

function cards(){const q=(document.getElementById('si')||{}).value||'';let ls=ST.filter(s=>{const m=!q.trim()||s.name.includes(q);if(flt==='active')return m&&s.remain>0;if(flt==='low')return m&&s.remain>0&&s.total>0&&s.remain/s.total<=.2;if(flt==='empty')return m&&s.remain<=0&&s.total>0;return m;});
ls.sort((a,b)=>{const o={low:0,medium:1,good:2};return(o[gst(a.remain,a.total).lv]||0)-(o[gst(b.remain,b.total).lv]||0);});
const g=document.getElementById('cg');if(!g)return;
if(!ls.length){g.innerHTML=`<div class="es"><div class="ic">🧘</div><h3>${ST.length?'未找到':'暂无学员'}</h3></div>`;return;}
g.innerHTML=ls.map((s,i)=>{const st=gst(s.remain,s.total);const pct=s.total>0?Math.max(0,s.remain)/s.total*100:0;const co=COL[ST.indexOf(s)%COL.length];
const bd=s.remain<=0&&s.total>0?'<span class="bdg al">课时已用完</span>':s.remain>0&&s.remain<=2?'<span class="bdg wn">即将用完</span>':'';
const n=s.notes?`<div class="nb">📌 ${E(s.notes)}</div>`:'';
const meta=[s.pkg,s.last?'上次：'+s.last:''].filter(Boolean).join(' · ');
return`<div class="sc" style="animation-delay:${i*.04}s" onclick="opD('${s.id}')">${bd}<div class="ct"><div class="av" style="background:${co}">${gi(s.name)}</div><div class="ci"><div class="cn">${E(s.name)}</div><div class="cm">${E(meta)}</div></div></div><div class="cs"><span class="cs-l">剩余课时</span><div><span class="cs-v" style="color:${st.clr}">${s.remain||0}</span> <span class="cs-t">/ ${s.total||0}</span></div></div><div class="pg"><div class="pf ${st.lv}" style="width:${Math.min(100,pct).toFixed(1)}%"></div></div>${n}<div class="ca"><button class="bs use" ${s.remain<=0?'disabled':''} onclick="event.stopPropagation();ded('${s.id}')">✓ 签到扣课</button><button class="bs ed" onclick="event.stopPropagation();opE('${s.id}')">编辑</button><button class="bs dl" onclick="event.stopPropagation();cDel('${s.id}')">删除</button></div></div>`;}).join('');}

function sf(f,b){flt=f;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('a'));b.classList.add('a');cards();}

// === DEDUCT ===
function ded(id){const s=ST.find(x=>x.id===id);if(!s||s.remain<=0)return;s.remain--;s.used=(s.used||0)+1;s.last=TD();CL.push({id:nid(CL,'S_'),sid:s.id,sn:s.name,date:TD(),time:'',notes:'快捷签到'});sv();stats();cards();toast(`✓ ${s.name} 签到成功 · 剩余 ${s.remain} 次`);}

// === STUDENT FORM ===
function fpk(v){document.getElementById('fPk').innerHTML='<option value="">—</option>'+PK.map(p=>`<option value="${E(String(p.name))}" ${p.name===v?'selected':''}>${E(String(p.name))}（${p.cls}次/${p.price}福林）</option>`).join('');}
function openAdd(){if(!ok){toast('⚠️ 请先导入数据');return;}eId=null;document.getElementById('fTi').textContent='添加新学员';document.getElementById('fBt').textContent='保存';document.getElementById('fN').value='';fpk('');document.getElementById('fTc').value='';document.getElementById('fRc').value='';document.getElementById('fUc').value='';document.getElementById('fDt').value=TD();document.getElementById('fNo').value='';document.getElementById('mF').classList.add('open');}
function opE(id){const s=ST.find(x=>x.id===id);if(!s)return;eId=id;document.getElementById('fTi').textContent='编辑学员';document.getElementById('fBt').textContent='保存修改';document.getElementById('fN').value=s.name;fpk(s.pkg);document.getElementById('fTc').value=s.total||'';document.getElementById('fRc').value=s.remain||'';document.getElementById('fUc').value=s.used||'';document.getElementById('fDt').value=s.join||'';document.getElementById('fNo').value=s.notes;document.getElementById('mF').classList.add('open');}
function subF(){const nm=document.getElementById('fN').value.trim();if(!nm)return document.getElementById('fN').focus();const pk=document.getElementById('fPk').value,tc=+document.getElementById('fTc').value||0,rc=+document.getElementById('fRc').value||0,uc=+document.getElementById('fUc').value||0,jd=document.getElementById('fDt').value,no=document.getElementById('fNo').value.trim();
if(eId){const s=ST.find(x=>x.id===eId);Object.assign(s,{name:nm,pkg:pk,total:tc,remain:rc,used:uc,join:jd,notes:no});toast(`已更新 ${nm}`);}else{ST.push({id:'X_'+String(ST.length+1).padStart(3,'0'),name:nm,pkg:pk,total:tc,remain:rc,used:uc,join:jd,last:'',notes:no});toast(`✨ 已添加 ${nm}`);}
sv();cl('mF');stats();cards();}
function cDel(id){const s=ST.find(x=>x.id===id);document.getElementById('cMs').textContent=`确定要删除「${s.name}」吗？`;document.getElementById('cBt').onclick=()=>{ST=ST.filter(x=>x.id!==id);sv();cl('mC');stats();cards();toast(`已删除 ${s.name}`);};document.getElementById('mC').classList.add('open');}

// === PACKAGES ===
function openPkg(){if(!ok){toast('⚠️ 请先导入数据');return;}pkM=null;rpk();document.getElementById('mP').classList.add('open');}
function rpk(){document.getElementById('ptb').innerHTML=PK.map(p=>`<tr><td class="pn">${E(String(p.name))}</td><td>${p.cls}</td><td class="pp">${p.price}福林</td><td><div class="pa"><button onclick="epk(${p.id})">✏️</button><button onclick="dpk(${p.id})">🗑</button></div></td></tr>`).join('');
const ea=document.getElementById('pea');if(pkM!==null){const d=pkM==='add'?{name:'',cls:'',price:''}:(PK.find(x=>x.id===pkM)||{});ea.innerHTML=`<div class="pe"><input class="i1" id="peN" value="${E(String(d.name||''))}" placeholder="名称"><input class="i2" id="peC" type="number" value="${d.cls||''}" placeholder="课时"><input class="i2" id="peP" type="number" value="${d.price||''}" placeholder="价格"><div class="peb"><button class="pes" onclick="svpk()">保存</button><button class="pec" onclick="pkM=null;rpk()">取消</button></div></div>`;document.getElementById('bapB').style.display='none';}else{ea.innerHTML='';document.getElementById('bapB').style.display='';}}
function addPk(){pkM='add';rpk();}
function epk(id){pkM=id;rpk();}
function svpk(){const nm=document.getElementById('peN').value.trim(),c=document.getElementById('peC').value,p=document.getElementById('peP').value;if(!nm)return alert('请输入名称');if(pkM==='add'){PK.push({id:PK.length?Math.max(...PK.map(x=>+x.id||0))+1:1,name:nm,cls:c,price:p});toast('✓ 已添加');}else{const pk=PK.find(x=>x.id===pkM);if(pk){pk.name=nm;pk.cls=c;pk.price=p;toast('✓ 已更新');}}sv();pkM=null;rpk();}
function dpk(id){const p=PK.find(x=>x.id===id);if(!p||!confirm(`删除「${p.name}」？`))return;PK=PK.filter(x=>x.id!==id);sv();rpk();toast(`已删除 ${p.name}`);}

// === DETAIL ===
function opD(id){dId=id;dTb='class';rD();document.getElementById('mD').classList.add('open');}
function rD(){const s=ST.find(x=>x.id===dId);if(!s)return;const st=gst(s.remain,s.total);const co=COL[ST.indexOf(s)%COL.length];
const cls=CL.filter(c=>c.sid===s.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
const rch=RE.filter(r=>r.sid===s.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
const ts=rch.reduce((a,r)=>a+(r.amt||0),0);
let h;if(dTb==='class'){h=cls.length?`<table class="ht"><thead><tr><th>日期</th><th>时间</th><th>备注</th></tr></thead><tbody>${cls.map(c=>`<tr><td>${c.date}</td><td>${E(c.time||'')}</td><td>${E(c.notes||'—')}</td></tr>`).join('')}</tbody></table>`:'<div class="he">暂无记录</div>';}
else{h=rch.length?`<table class="ht"><thead><tr><th>日期</th><th>套餐</th><th>课时</th><th>价格</th><th>支付</th><th>备注</th></tr></thead><tbody>${rch.map(r=>`<tr><td>${r.date}</td><td>${E(r.pkg)}</td><td>${r.cls}次</td><td>${r.amt}福林</td><td>${E(r.pay)}</td><td>${E(r.notes||'—')}</td></tr>`).join('')}</tbody></table>`:'<div class="he">暂无记录</div>';}
const meta=[s.pkg,s.join?'入学：'+FD(s.join):'',s.last?'上次：'+s.last:''].filter(Boolean).join(' · ');
document.getElementById('dc').innerHTML=`<div class="dh"><div class="da" style="background:${co}">${gi(s.name)}</div><div><div class="dn">${E(s.name)}</div><div class="dm">${E(meta)}</div>${s.notes?`<div style="font-size:.76rem;color:var(--sage-dark);margin-top:3px">📌 ${E(s.notes)}</div>`:''}</div></div>
<div class="ds"><div class="di"><div class="dv" style="color:${st.clr}">${s.remain||0}</div><div class="dll">剩余课时</div></div><div class="di"><div class="dv">${s.used||0}</div><div class="dll">已上课时</div></div><div class="di"><div class="dv" style="color:var(--clay)">${ts}福林</div><div class="dll">累计充值</div></div></div>
<div class="tabs"><button class="tab ${dTb==='class'?'ac':''}" onclick="dTb='class';rD()">📖 上课记录 (${cls.length})</button><button class="tab ${dTb==='recharge'?'ac':''}" onclick="dTb='recharge';rD()">💰 充值记录 (${rch.length})</button></div>
<div style="display:flex;justify-content:flex-end;margin-bottom:.5rem">${dTb==='class'?`<button class="bap" onclick="oAC('${s.id}')">+ 上课记录</button>`:`<button class="bap" onclick="oAR('${s.id}')">+ 充值记录</button>`}</div>${h}<div class="ma"><button class="bc" onclick="cl('mD')">关闭</button></div>`;}

// === ADD CLASS ===
function oAC(id){arId=id;document.getElementById('acD').value=TD();document.getElementById('acT').value='';document.getElementById('acN').value='';document.getElementById('mAC').classList.add('open');}
function subAC(){const s=ST.find(x=>x.id===arId);if(!s)return;CL.push({id:nid(CL,'S_'),sid:s.id,sn:s.name,date:document.getElementById('acD').value,time:document.getElementById('acT').value,notes:document.getElementById('acN').value.trim()});
if(s.remain>0)s.remain--;s.used=(s.used||0)+1;s.last=document.getElementById('acD').value;sv();cl('mAC');rD();stats();cards();toast('✓ 已添加上课记录');}

// === ADD RECHARGE ===
function oAR(id){arId=id;document.getElementById('arD').value=TD();
document.getElementById('arPk').innerHTML=PK.filter(p=>p.name).map(p=>`<option value="${E(String(p.name))}" data-c="${p.cls}" data-p="${p.price}">${E(String(p.name))}</option>`).join('');
const f=PK[0];if(f){document.getElementById('arCl').value=f.cls||'';document.getElementById('arPr').value=f.price||'';}
document.getElementById('arPk').onchange=function(){const o=this.options[this.selectedIndex];document.getElementById('arCl').value=o.getAttribute('data-c')||'';document.getElementById('arPr').value=o.getAttribute('data-p')||'';};
document.getElementById('arNo').value='';document.getElementById('mAR').classList.add('open');}
function subAR(){const s=ST.find(x=>x.id===arId);if(!s)return;const c=+document.getElementById('arCl').value||0,a=+document.getElementById('arPr').value||0;
RE.push({id:nid(RE,'C_'),sid:s.id,sn:s.name,date:document.getElementById('arD').value,pkg:document.getElementById('arPk').value,cls:c,amt:a,pay:document.getElementById('arPy').value,notes:document.getElementById('arNo').value.trim()});
s.total=(s.total||0)+c;s.remain=(s.remain||0)+c;s.pkg=document.getElementById('arPk').value;
sv();cl('mAR');rD();stats();cards();toast('✓ 充值成功');}

// === MODAL CLOSE ===
['mF','mP','mD','mC','mAC','mAR'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this)cl(id);});});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.mo.open').forEach(m=>m.classList.remove('open'));});

// === INIT ===
if(API){loadCloud().then(loaded=>{if(!loaded&&ldLS())ok=true;render();}).catch(()=>{if(ldLS())ok=true;render();});}
else{if(ldLS())ok=true;render();}
</script>
</body>
</html>
